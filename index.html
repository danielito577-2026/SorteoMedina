<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viaje de Egresados - Theo Quiuan 🐳🎓</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #fdfaf5; 
            color: #5d4037; 
            padding: 10px; margin: 0;
            text-align: center;
        }
        .container { 
            background: #ffffff; 
            padding: 20px; 
            border-radius: 30px; 
            max-width: 500px; 
            margin: auto; 
            border: 2px solid #e0d5c1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .header-theo { margin-bottom: 10px; }
        h1 { color: #8d6e63; font-size: 24px; margin: 5px 0 2px; }
        .subtitulo-egresados { 
            color: #ff8a65; 
            font-weight: bold; 
            letter-spacing: 1px; 
            font-size: 13px;
            display: block;
            margin-bottom: 15px;
        }

        /* COLLAGE CENTRAL */
        .collage-container {
            position: relative;
            width: 100%;
            height: 220px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .foto-collage {
            position: absolute;
            border-radius: 12px;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            object-fit: cover;
            background: #eee;
        }
        .foto1 { width: 130px; height: 130px; transform: rotate(-8deg) translateX(-60px); z-index: 1; }
        .foto2 { width: 120px; height: 160px; transform: rotate(5deg) translateY(-10px); z-index: 3; }
        .foto3 { width: 110px; height: 150px; transform: rotate(-5deg) translateX(70px) translateY(10px); z-index: 2; }

        .historia { 
            background: #fff8e1; 
            padding: 15px; 
            border-radius: 15px; 
            font-size: 14px; 
            line-height: 1.5;
            margin-bottom: 20px;
            border: 1px dashed #ffcc80;
        }

        .premios-box { background: #fdf3e7; border-radius: 20px; padding: 15px; margin: 20px 0; border: 1px solid #ffccbc; text-align: left; }
        .premio-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 15px; }
        .premio-nro { background: #ff8a65; color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; margin-right: 10px; }

        .meta-container { margin: 25px 0; text-align: left; }
        .meta-label { font-size: 12px; font-weight: bold; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .progress-bar-bg { background: #eee; height: 18px; border-radius: 10px; overflow: hidden; border: 1px solid #ddd; }
        .progress-bar-fill { 
            background: linear-gradient(90deg, #4caf50, #8bc34a); 
            height: 100%; width: 0%; transition: width 1.5s ease-in-out;
        }

        .info-pago { background: #fbe9e7; border-radius: 20px; padding: 15px; margin-bottom: 20px; border: 1px solid #ffccbc; }
        .alias-click { color: #d84315; font-weight: bold; cursor: pointer; background: #fff; padding: 8px 15px; border-radius: 10px; border: 1px solid #ff8a65; display: inline-block; margin-top: 5px; }
        #copiado-aviso { font-size: 12px; color: #4caf50; display: none; margin-top: 5px; font-weight: bold; }

        .grilla { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin: 20px 0; }
        .nro { 
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
            background: #f5f5f5; color: #8d6e63; border-radius: 8px; cursor: pointer; 
            font-weight: bold; font-size: 11px; border: 1px solid #e0e0e0;
        }
        .nro.reservado { background: #eee; color: #bbb; cursor: not-allowed; text-decoration: line-through; border: none; }
        .nro.seleccionado { background: #ff8a65; color: white; transform: scale(1.1); z-index: 5; }
        
        #form-reserva { display: none; margin-top: 20px; padding: 20px; background: #fff8f1; border-radius: 20px; border: 2px solid #ff8a65; }
        input { padding: 12px; width: 90%; margin-bottom: 15px; border-radius: 10px; border: 1px solid #d7ccc8; font-size: 16px; }
        button { background: #4caf50; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }

        .footer { margin-top: 30px; color: #a1887f; font-size: 12px; border-top: 1px solid #eee; padding-top: 20px; }
        .fecha-sorteo { background: #8d6e63; color: white; padding: 8px 20px; border-radius: 20px; display: inline-block; margin: 15px 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-theo">
        <h1>¡Todos por Theo! 🐳</h1>
        <span class="subtitulo-egresados">🎓 MI VIAJE DE EGRESADOS</span>
    </div>

    <div class="collage-container">
        <img src="theo gato.jpeg" class="foto-collage foto1" alt="Theo con gato">
        <img src="theo escuela 1.jpeg" class="foto-collage foto2" alt="Theo acto escolar">
        <img src="theo escuela 2.jpeg" class="foto-collage foto3" alt="Theo bandera">
    </div>

    <div class="historia">
