<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa de Pascuas - Reserva</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #fff5f8; color: #444; padding: 15px; }
        .container { background: white; padding: 25px; border-radius: 20px; max-width: 500px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: #ff4081; font-size: 24px; }
        .grilla { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 10px; margin-top: 20px; }
        .nro { padding: 12px 5px; background: #fce4ec; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; border: 1px solid #f8bbd0; }
        .nro:hover { background: #f8bbd0; transform: scale(1.1); }
        .nro.reservado { background: #e0e0e0; color: #9e9e9e; cursor: not-allowed; text-decoration: line-through; border: none; }
        .nro.seleccionado { background: #ff4081; color: white; border-color: #c2185b; box-shadow: 0 0 10px rgba(255, 64, 129, 0.5); }
        
        /* Estilo del Menú de Reserva */
        #form-reserva { 
            display: none; 
            margin-top: 25px; 
            padding: 20px; 
            background: #fff0f6; 
            border-radius: 15px; 
            border: 2px dashed #ff80ab;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input { padding: 12px; width: 90%; margin-bottom: 12px; border-radius: 8px; border: 1px solid #ff80ab; outline: none; }
        input:focus { border: 2px solid #ff4081; }
        button { background: #ff4081; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }
        button:hover { background: #c2185b; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h1>🐰 Rifa de Pascuas 🐣</h1>
    <p>Tocá un número para reservarlo:</p>
    
    <div id="grilla" class="grilla">Cargando sorteo...</div>

    <div id="form-reserva">
        <h3>📍 Reservando el N° <span id="nro-elegido" style="color:#ff4081"></span></h3>
        <input type="text" id="nombre-cliente" placeholder="Tu Nombre Completo">
        <input type="tel" id="tel-cliente" placeholder="Tu Teléfono (WhatsApp)">
        <br>
        <button id="btn-confirmar" onclick="enviarReserva()">¡CONFIRMAR MI NÚMERO!</button>
        <p style="font-size: 11px; color: #888; margin-top: 10px;">Tu número quedará pendiente hasta verificar el pago.</p>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyGzqNdxeuRlg8qL6gcWhkk5IlMEzbmcstgRaQeg3-9J0MkVtihGo_KhUOvwOjVSzkQ/exec';
    let numeroSeleccionado = null;

    async function cargarNumeros() {
        try {
            const res = await fetch(scriptURL);
            const data = await res.json();
            const grilla = document.getElementById('grilla');
            grilla.innerHTML = '';

            for (let i = 1; i < data.length; i++) {
                const nro = data[i][0];
                const estado = data[i][2];
                const div = document.createElement('div');
                div.className = 'nro' + (estado === 'Reservado' ? ' reservado' : '');
                div.innerText = nro;
                
                if (estado !== 'Reservado') {
                    div.onclick = () => abrirMenu(nro, div);
                }
                grilla.appendChild(div);
            }
        } catch (e) { console.error("Error al cargar", e); }
    }

    function abrirMenu(nro, elemento) {
        // Marcamos el número visualmente
        document.querySelectorAll('.nro').forEach(el => el.classList.remove('seleccionado'));
        elemento.classList.add('seleccionado');
        
        // Seteamos los datos en el formulario
        numeroSeleccionado = nro;
        document.getElementById('nro-elegido').innerText = nro;
        document.getElementById('form-reserva').style.display = 'block';
        
        // Scroll suave hasta el formulario
        document.getElementById('form-reserva').scrollIntoView({ behavior: 'smooth' });
    }

    async function enviarReserva() {
        const nombre = document.getElementById('nombre-cliente').value;
        const telefono = document.getElementById('tel-cliente').value;
        
        if (!nombre || !telefono) return alert("Por favor, completa nombre y teléfono.");

        const btn = document.getElementById('btn-confirmar');
        btn.innerText = "⏳ Guardando reserva...";
        btn.disabled = true;

        try {
            // Enviamos NOMBRE y TELEFONO al Excel
            // El script de Google recibe los datos y los pone en las columnas B y D
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ 
                    numero: numeroSeleccionado, 
                    nombre: nombre,
                    telefono: telefono // Agregamos este dato al envío
                })
            });

            alert("¡Listo! Tu número " + numeroSeleccionado + " ha sido reservado. Comunicate con nosotros para el pago.");
            location.reload();
        } catch (e) {
            alert("Hubo un error. Reintenta.");
            btn.disabled = false;
        }
    }

    cargarNumeros();
</script>
</body>
</html>
