<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa de Pascuas - Edición Especial</title>
    <style>
        /* ESTILO 1: DARK MODE CON GRILLA SIMÉTRICA */
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: #121212; 
            color: #e0e0e0; 
            padding: 10px; 
            margin: 0;
        }
        .container { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 24px; 
            max-width: 550px; /* Un poquito más ancho para las 10 columnas */
            margin: auto; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        h1 { color: #ff4081; font-size: 24px; margin-bottom: 5px; text-align: center; }
        .subtitulo { color: #888; font-weight: 500; margin-bottom: 20px; display: block; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; text-align: center; }

        .info-box { 
            background: #252525; 
            border-radius: 16px; 
            padding: 15px; 
            margin-bottom: 20px; 
            border-left: 4px solid #ff4081;
        }
        
        .pago-info { 
            background: #121212; 
            border-radius: 12px; 
            padding: 15px; 
            margin-top: 10px; 
            border: 1px solid #444; 
            text-align: center;
        }
        .alias-click { 
            color: #ff4081; 
            font-weight: bold; 
            cursor: pointer; 
            background: #2d2d2d; 
            padding: 8px 15px; 
            border-radius: 8px; 
            display: inline-block;
            margin-top: 5px;
            border: 1px solid #ff4081;
        }
        #copiado-aviso { font-size: 12px; color: #4caf50; display: none; margin-top: 8px; font-weight: bold; }

        /* GRILLA DE 10 COLUMNAS EXACTAS */
        .grilla { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); /* Esto fuerza las 10 columnas */
            gap: 6px; 
            margin: 20px 0; 
            min-height: 100px;
        }
        .nro { 
            aspect-ratio: 1 / 1; /* Los hace cuadraditos perfectos */
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2d2d2d; 
            color: #ff4081;
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 13px;
            transition: 0.2s; 
            border: 1px solid #3d3d3d;
        }
        .nro:hover { border-color: #ff4081; transform: scale(1.1); z-index: 10; }
        .nro.reservado { background: #1a1a1a; color: #444; cursor: not-allowed; text-decoration: line-through; border: none; }
        .nro.seleccionado { 
            background: #ff4081; 
            color: white; 
            border-color: #ff4081; 
            box-shadow: 0 0 15px rgba(255, 64, 129, 0.5); 
        }
        
        /* Formulario y Botones */
        #form-reserva { display: none; margin-top: 20px; padding: 15px; background: #252525; border-radius: 20px; border: 1px solid #ff4081; }
        input { padding: 12px; width: 90%; margin-bottom: 10px; border-radius: 10px; border: 1px solid #444; background: #121212; color: white; outline: none; }
        button { background: #25d366; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }

        /* FOOTER CENTRADO */
        .footer { 
            margin-top: 30px; 
            color: #888; 
            font-size: 13px; 
            text-align: center; /* Centrado total */
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        .fecha-sorteo { 
            background: #333; 
            color: #ff4081; 
            padding: 8px 15px; 
            border-radius: 20px; 
            display: inline-block; 
            margin: 15px 0; 
            font-weight: bold; 
            border: 1px solid #ff4081; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🐰 RIFA DE PASCUAS</h1>
    <span class="subtitulo">VIAJE DE EGRESADOS 🎓</span>

    <div class
