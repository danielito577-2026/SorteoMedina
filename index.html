<style>
    .grilla {
        display: grid;
        grid-template-columns: repeat(5, 1fr); /* 5 columnas */
        gap: 10px;
        margin-top: 20px;
    }
    .numero {
        padding: 15px;
        background: #e0e0e0;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }
    .numero.seleccionado {
        background: #ff80ab;
        color: white;
    }
    .numero.reservado {
        background: #757575;
        cursor: not-allowed;
        text-decoration: line-through;
    }
</style>

<div class="grilla" id="rifa">
    </div>

<script>
    const contenedor = document.getElementById('rifa');
    for (let i = 1; i <= 100; i++) {
        let div = document.createElement('div');
        div.className = 'numero';
        div.innerText = i.toString().padStart(2, '0');
        div.onclick = function() {
            this.classList.toggle('seleccionado');
            alert("Has seleccionado el número " + i + ". ¡Contactame para reservarlo!");
        };
        contenedor.appendChild(div);
    }
</script>
